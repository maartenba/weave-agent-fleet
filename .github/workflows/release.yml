name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            node_arch: arm64
            node_platform: darwin
            cross_compile: false
          - os: macos-latest
            target: darwin-x64
            node_arch: x64
            node_platform: darwin
            cross_compile: true
          - os: ubuntu-latest
            target: linux-x64
            node_arch: x64
            node_platform: linux
            cross_compile: false
          - os: ubuntu-24.04-arm
            target: linux-arm64
            node_arch: arm64
            node_platform: linux
            cross_compile: false
          - os: windows-latest
            target: windows-x64
            node_arch: x64
            node_platform: win
            cross_compile: false
          # NOTE: Windows arm64 is not yet supported — GitHub Actions does not
          # provide Windows arm64 runners. Node.js ships win-arm64 binaries, so
          # when runners become available, add a windows-arm64 entry here.
          # The install.ps1 script already detects ARM64 and prints an error.

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Read Node.js version
        id: node-version
        shell: bash
        run: echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.node-version.outputs.version }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build standalone
        run: bun run build
        env:
          APP_VERSION: ${{ github.ref_name }}

      # --- Cross-compile native addons when host arch != target arch ---
      - name: Rebuild native addons for target architecture (Unix)
        if: matrix.cross_compile
        run: |
          npm rebuild better-sqlite3 --arch=${{ matrix.node_arch }}

      # --- Unix assembly ---
      - name: Assemble standalone (Unix)
        if: runner.os != 'Windows'
        run: bash scripts/assemble-standalone.sh

      # --- Windows assembly ---
      - name: Assemble standalone (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh scripts/assemble-standalone.ps1

      # --- Unix: Download Node.js binary ---
      - name: Download Node.js binary (Unix)
        if: runner.os != 'Windows'
        run: |
          NODE_VERSION="${{ steps.node-version.outputs.version }}"
          PLATFORM="${{ matrix.node_platform }}"
          ARCH="${{ matrix.node_arch }}"
          NODE_DIST="node-v${NODE_VERSION}-${PLATFORM}-${ARCH}"

          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/${NODE_DIST}.tar.gz" -o node-dist.tar.gz
          tar xzf node-dist.tar.gz
          mkdir -p staging/bin
          cp "${NODE_DIST}/bin/node" staging/bin/node
          chmod +x staging/bin/node

      # --- Windows: Download Node.js binary ---
      - name: Download Node.js binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $NodeVersion = "${{ steps.node-version.outputs.version }}"
          $Arch = "${{ matrix.node_arch }}"
          $NodeDist = "node-v${NodeVersion}-win-${Arch}"
          $ZipUrl = "https://nodejs.org/dist/v${NodeVersion}/${NodeDist}.zip"

          Invoke-WebRequest -Uri $ZipUrl -OutFile node-dist.zip -UseBasicParsing
          Expand-Archive -Path node-dist.zip -DestinationPath . -Force

          New-Item -ItemType Directory -Path staging/bin -Force | Out-Null
          Copy-Item "${NodeDist}/node.exe" staging/bin/node.exe

      # --- Unix: Package tarball ---
      - name: Package tarball (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          DIR_NAME="weave-fleet-v${VERSION}-${TARGET}"

          mkdir -p "${DIR_NAME}/bin" "${DIR_NAME}/app"

          # Copy Node.js binary
          cp staging/bin/node "${DIR_NAME}/bin/node"

          # Copy launcher script
          cp scripts/launcher.sh "${DIR_NAME}/bin/weave-fleet"
          chmod +x "${DIR_NAME}/bin/weave-fleet"

          # Determine standalone directory (may be nested under project name)
          if [ -f ".next/standalone/server.js" ]; then
            STANDALONE_SRC=".next/standalone"
          else
            STANDALONE_SRC="$(find .next/standalone -name server.js -maxdepth 2 -exec dirname {} \; | head -1)"
          fi

          if [ -z "$STANDALONE_SRC" ]; then
            echo "Error: standalone server.js not found" >&2
            exit 1
          fi

          # Copy standalone app
          cp -r "${STANDALONE_SRC}/." "${DIR_NAME}/app/"

          # Write version (root for launcher, app/ for version-check at runtime)
          echo "${VERSION}" > "${DIR_NAME}/VERSION"
          echo "${VERSION}" > "${DIR_NAME}/app/VERSION"

          # Create tarball
          tar czf "${DIR_NAME}.tar.gz" "${DIR_NAME}"

          # Generate checksum (use sha256sum on Linux, shasum on macOS)
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${DIR_NAME}.tar.gz" > "${DIR_NAME}.tar.gz.sha256"
          else
            shasum -a 256 "${DIR_NAME}.tar.gz" > "${DIR_NAME}.tar.gz.sha256"
          fi

      # --- Windows: Package zip ---
      - name: Package zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = "$env:GITHUB_REF_NAME" -replace '^v', ''
          $Target = "${{ matrix.target }}"
          $DirName = "weave-fleet-v${Version}-${Target}"

          New-Item -ItemType Directory -Path "${DirName}/bin" -Force | Out-Null
          New-Item -ItemType Directory -Path "${DirName}/app" -Force | Out-Null

          # Copy Node.js binary
          Copy-Item staging/bin/node.exe "${DirName}/bin/node.exe"

          # Copy launcher script
          Copy-Item scripts/launcher.cmd "${DirName}/bin/weave-fleet.cmd"

          # Determine standalone directory (may be nested under project name)
          $StandaloneSrc = $null
          if (Test-Path ".next/standalone/server.js") {
            $StandaloneSrc = ".next/standalone"
          } else {
            $nested = Get-ChildItem -Path ".next/standalone" -Directory | Where-Object {
              Test-Path (Join-Path $_.FullName "server.js")
            } | Select-Object -First 1
            if ($nested) {
              $StandaloneSrc = $nested.FullName
            }
          }

          if (-not $StandaloneSrc) {
            Write-Error "standalone server.js not found"
            exit 1
          }

          # Copy standalone app
          Copy-Item -Path "${StandaloneSrc}/*" -Destination "${DirName}/app/" -Recurse -Force

          # Write version (root for launcher, app/ for version-check at runtime)
          Set-Content -Path "${DirName}/VERSION" -Value $Version -NoNewline
          Set-Content -Path "${DirName}/app/VERSION" -Value $Version -NoNewline

          # Create zip
          Compress-Archive -Path $DirName -DestinationPath "${DirName}.zip" -Force

          # Generate checksum
          $hash = (Get-FileHash -Path "${DirName}.zip" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "${DirName}.zip.sha256" -Value "${hash}  ${DirName}.zip"

      # --- Upload artifacts ---
      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: tarball-${{ matrix.target }}
          path: |
            weave-fleet-*.tar.gz
            weave-fleet-*.tar.gz.sha256

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: tarball-${{ matrix.target }}
          path: |
            weave-fleet-*.zip
            weave-fleet-*.zip.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge checksums
        run: cat artifacts/*.sha256 > artifacts/checksums.txt

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/weave-fleet-*.tar.gz
            artifacts/weave-fleet-*.zip
            artifacts/checksums.txt
            scripts/install.sh
            scripts/install.ps1

  build-tauri:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Read Node.js version
        id: node-version
        shell: bash
        run: echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.node-version.outputs.version }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target (macOS cross-compile)
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: bun install --frozen-lockfile

      - name: Run Tauri pre-build
        run: node scripts/tauri-prebuild.mjs
        env:
          TAURI_TARGET_TRIPLE: ${{ matrix.rust_target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          releaseId: ${{ needs.release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

  deploy-vanity-url:
    needs: [release, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          path: source

      - name: Update scripts on gh-pages
        run: |
          cp source/scripts/install.sh gh-pages/agent-fleet.sh
          if [ -f source/scripts/install.ps1 ]; then
            cp source/scripts/install.ps1 gh-pages/agent-fleet.ps1
          fi

      - name: Commit and push
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agent-fleet.sh agent-fleet.ps1 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Update install scripts for ${GITHUB_REF_NAME}"
            git push
          fi

  notify-website:
    needs: [release, build-tauri]
    runs-on: ubuntu-latest

    steps:
      - name: Notify weave-website to update Fleet version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.WEBSITE_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/pgermishuys/weave-website/dispatches \
            -d "{\"event_type\":\"fleet-version-update\",\"client_payload\":{\"version\":\"${VERSION}\"}}"
